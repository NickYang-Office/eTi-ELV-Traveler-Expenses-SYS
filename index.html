        .btn { padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; }

        .btn-primary:hover { background-color: #2563eb; }
        .btn-success { background-color: #10b981; color: white; }
        .btn-success:hover { background-color: #059669; }
        .btn-warning { background-color: #f59e0b; color: white; }
        .btn-warning:hover { background-color: #d97706; }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        .btn-outline { background-color: transparent; border: 1px solid #d1d5db; color: #4b5563; }
        .btn-outline:hover { background-color: #f3f4f6; }
        
        .day-header { background-color: #f0f9ff; border-bottom: 2px solid #3b82f6; padding: 1rem; border-radius: 0.75rem 0.75rem 0 0; display: flex; justify-content: space-between; align-items: center;}
        .day-body { padding: 1rem; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 0.75rem 0.75rem; background: white; }
        
        .grand-total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a8a; color: white; padding: 1rem; box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 50; }
        
        .applicant-tag { display: inline-flex; align-items: center; background: #eff6ff; color: #1e40af; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; margin-right: 0.5rem; margin-bottom: 0.5rem; border: 1px solid #bfdbfe; }

        .applicant-tag button:hover { color: #1e40af; }

        .app-row { transition: background-color 0.2s; }

<!-- 後台登入按鈕 -->
<button onclick="showLogin()" class="fixed top-4 right-4 text-gray-500 hover:text-blue-600 bg-white px-3 py-2 rounded-lg shadow-md text-sm z-40 transition-all">
    <i class="fas fa-cog mr-1"></i>後台管理
</button>

<div class="max-w-5xl mx-auto p-4">
    <!-- Header -->
    <div class="mb-4 text-center">
        <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-calculator text-blue-500 mr-2"></i>廢車組人員差旅費用試算系統(v0.5)</h1>
        <p class="text-gray-500 text-sm mt-1">智慧行程費用估算</p>
    </div>

    <!-- Global Settings Card -->
    <div class="card border-l-4 border-blue-500">
        <h2 class="text-lg font-bold mb-4 text-gray-700">1. 基本設定 (全行程適用)</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-1 md:col-span-2 bg-blue-50 p-4 rounded-lg border border-blue-100">
                <label class="input-label mb-2">申請人名單</label>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="newApplicantInput" list="applicantOptionsList" class="input-field" placeholder="選擇或輸入姓名後按新增" onkeypress="handleEnter(event)">
                    <button onclick="addApplicant()" class="btn btn-primary whitespace-nowrap">新增</button>
                </div>
                <datalist id="applicantOptionsList"></datalist>
                <div id="applicantList" class="flex flex-wrap"></div>
            </div>

            <div class="input-group">
                <label class="input-label">出發辦公室 (起點)</label>
                <select id="originOffice" class="input-field bg-yellow-50" onchange="onOfficeChange()">
                    <option value="新北" selected>新北辦公室</option>
                    <option value="台中">台中辦公室</option>
                </select>
                <p class="text-xs text-blue-500 mt-1">* 系統將自動篩選僅顯示該辦公室可選的廠商</p>
            </div>
            <div class="input-group">
                <label class="input-label">共乘人數 (計算用)</label>
                <input type="number" id="carpoolCount" class="input-field bg-yellow-50" value="2" min="1" onchange="recalculateAll()">
                <p class="text-xs text-gray-500 mt-1">*「平分」時，金額將除以此數字</p>
            </div>
        </div>
    </div>

    <!-- Days Container -->
    <div id="daysContainer" class="space-y-6"></div>

    <!-- Add Day Button -->
    <div class="mt-6 text-center">
        <button onclick="addDay()" class="btn btn-primary text-lg px-6 py-3 shadow-lg transform hover:scale-105 transition-transform">
            <i class="fas fa-calendar-plus mr-2"></i> 新增空白日期
        </button>
    </div>

    <!-- Final Summary Breakdown -->
    <div class="card mt-8 border-l-4 border-indigo-500" id="finalSummaryCard">
        <h2 class="text-lg font-bold mb-4 text-gray-700">4. 費用總結</h2>
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-100 text-gray-600 text-sm border-b border-gray-200">
                    <th class="p-3">姓名</th>
                    <th class="p-3 text-right">差旅費總和</th>
                    <th class="p-3 text-right">文件寄送費</th>
                    <th class="p-3 text-right">應申報總額</th>
                </tr>
            </thead>
            <tbody id="summaryTableBody"></tbody>
        </table>
    </div>

</div>

<div class="grand-total-bar flex justify-between items-center">
    <div>
        <div class="text-sm opacity-80">本次申請總支出</div>

    <div class="text-3xl font-bold" id="grandTotalDisplay">$0</div>
</div>

<datalist id="vendorOptions"></datalist>

<!-- 登入對話框 (Modal) -->
<div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">

        <input type="text" id="adminUser" placeholder="帳號" class="input-field mb-3" onkeypress="handleLoginEnter(event)">
        <input type="password" id="adminPass" placeholder="密碼" class="input-field mb-4" onkeypress="handleLoginEnter(event)">
        <div id="loginError" class="text-red-500 text-sm mb-3 hidden"><i class="fas fa-exclamation-triangle mr-1"></i>帳號或密碼錯誤</div>
        <div class="flex justify-end gap-2">
            <button onclick="hideLogin()" class="btn btn-outline">取消</button>
            <button onclick="handleLogin()" class="btn btn-primary">登入</button>
        </div>
    </div>
</div>

            </div>
            <div id="adminApplicantList" class="flex flex-wrap gap-2 p-2 bg-gray-50 rounded border border-gray-200 min-h-[50px]">
                <!-- tags will be injected here -->
            </div>
        </div>

                <div>

                </div>

                </div>

            </div>

            </div>
        </div>

            <div class="flex justify-between items-center mb-4">

            </div>
            <div class="overflow-x-auto border border-gray-200 rounded" style="max-height: 50vh;">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-gray-200 shadow-sm z-10">

                            <th class="p-3 border-b w-24">縣市</th>
                            <th class="p-3 border-b w-32">出發辦公室</th>
                            <th class="p-3 border-b w-24">費用</th>
                            <th class="p-3 border-b w-32 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="bg-white"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

    // --- 5. CALCULATION LOGIC ---
    function recalculateAll() {
        const days = document.querySelectorAll('.day-wrapper');
        let applicantTotals = {};
        applicants.forEach(app => applicantTotals[app] = 0);

        days.forEach(day => {
            const dayResults = calculateDay(day.id);
            for (const [name, amount] of Object.entries(dayResults)) {
                if (applicantTotals[name] !== undefined) {
                    applicantTotals[name] += amount;
                }
            }
        });
        
        const docFee = 500;
        let grandTotal = 0;

        const tbody = document.getElementById('summaryTableBody');
        tbody.innerHTML = '';
        
        if (applicants.length === 0) {
             tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-400">請先新增申請人</td></tr>';
        } else {
            applicants.forEach(app => {
                const travelTotal = applicantTotals[app] || 0;
                const final = travelTotal + docFee;
                grandTotal += final;

                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 last:border-0";
                tr.innerHTML = `
                    <td class="p-3 font-medium text-gray-800"><i class="fas fa-user text-blue-400 mr-2"></i>${app}</td>
                    <td class="p-3 text-right text-gray-600">$${Math.round(travelTotal)}</td>
                    <td class="p-3 text-right text-gray-600">+$${docFee}</td>
                    <td class="p-3 text-right font-bold text-indigo-600">$${Math.round(final)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('totalApplicantsCount').innerText = `${applicants.length} 位人員合計 (含每人$500文件費)`;
        document.getElementById('grandTotalDisplay').innerText = "$" + Math.round(grandTotal).toLocaleString();
    }

    function calculateDay(dayId) {
        const origin = document.getElementById('originOffice').value;
        const carpoolCount = parseInt(document.getElementById('carpoolCount').value) || 1;
        const container = document.getElementById(dayId + '-vendors');
        const tableBody = document.getElementById(dayId + '-applicantTable');
        const dayContainer = document.getElementById(dayId);
        
        const inputs = container.querySelectorAll('.vendor-input');
        let selectedVendors = [];
        let maxCost = 0;
        let hasCrossCity = false;

        inputs.forEach(input => {
            const row = input.closest('div[id^="row-"]');
            const vData = vendorsDB.find(v => v.name === input.value);
            input.classList.remove('text-red-500', 'font-bold');
            row.querySelector('.group-dupe-alert').classList.add('hidden');
            
            if (vData) {
                selectedVendors.push({data: vData, row: row});
                if (vData.cost > maxCost) maxCost = vData.cost;
                
                let isCross = true;
                if (origin === '新北') {
                    if (vData.city.includes('新北') || vData.city.includes('台北')) isCross = false;
                } else if (origin === '台中') {
                    if (vData.city.includes('台中')) isCross = false;
                }
                if (isCross) hasCrossCity = true;
            }
        });

        if (selectedVendors.length === 0) maxCost = 0;
        const totalStops = selectedVendors.length;
        let deduction = 0;
        const vendorNames = selectedVendors.map(v => v.data.name);
        
        exclusionGroups.forEach(group => {
            let uniqueVendorMatches = new Set();
            group.forEach(keyword => {
                selectedVendors.forEach(sv => {
                    if(sv.data.name.includes(keyword)) {
                        uniqueVendorMatches.add(sv.data.name);
                    }
                });
            });
            if (uniqueVendorMatches.size > 1) {
                deduction += (uniqueVendorMatches.size - 1);
                selectedVendors.forEach(sv => {
                    if ([...uniqueVendorMatches].includes(sv.data.name)) {
                         sv.row.querySelector('.vendor-input').classList.add('text-red-500', 'font-bold');
                         sv.row.querySelector('.group-dupe-alert').classList.remove('hidden');
                    }
                });
            }
        });

        let effectiveStops = 0;
        if (totalStops > 0) {
            effectiveStops = Math.max(0, totalStops - 1 - deduction);
        }
        const extraFeeTotal = effectiveStops * 100;

        document.getElementById(dayId + '-baseRaw').innerText = `$${maxCost}`;
        document.getElementById(dayId + '-extraCount').innerText = effectiveStops;

        let dayResult = {};

        // 1. Determine Visible Applicants for this Day
        const limitedAppsJson = dayContainer.dataset.limitedApplicants;
        const visibleApplicants = limitedAppsJson ? JSON.parse(limitedAppsJson) : applicants;

        // 2. Remove rows for applicants NOT visible (or deleted global ones)
        Array.from(tableBody.children).forEach(row => {
            const name = row.getAttribute('data-name');
            if (!applicants.includes(name) || !visibleApplicants.includes(name)) {
                row.remove();
            }
        });

        // 3. Create/Update Rows for Visible Applicants
        visibleApplicants.forEach(app => {
            if (!applicants.includes(app)) return;

            let row = tableBody.querySelector(`tr[data-name="${app}"]`);
            if (!row) {
                let defaultBase = 'split';
                let defaultExtra = 'full';
                const prevDay = dayContainer.previousElementSibling;
                if (prevDay && prevDay.classList.contains('day-wrapper')) {
                     const prevTable = prevDay.querySelector(`#${prevDay.id}-applicantTable`);
                     const prevRow = prevTable ? prevTable.querySelector(`tr[data-name="${app}"]`) : null;
                     if (prevRow) {
                         defaultBase = prevRow.querySelector('.base-mode-select').value;
                         defaultExtra = prevRow.querySelector('.extra-mode-select').value;
                     }
                }

                row = document.createElement('tr');
                row.setAttribute('data-name', app);
                row.className = "border-b border-gray-100 app-row";
                row.innerHTML = `
                    <td class="px-2 py-2 font-medium text-gray-700">${app}</td>
                    <td class="px-2 py-2 text-center">
                        <select class="base-mode-select cost-select" onchange="recalculateAll()">
                            <option value="full" ${defaultBase === 'full' ? 'selected' : ''}>全額</option>
                            <option value="split" ${defaultBase === 'split' ? 'selected' : ''}>平分</option>
                            <option value="none" ${defaultBase === 'none' ? 'selected' : ''}>不領取</option>
                        </select>
                    </td>
                    <td class="px-2 py-2 text-center">
                        <select class="extra-mode-select cost-select" onchange="recalculateAll()">
                            <option value="full" ${defaultExtra === 'full' ? 'selected' : ''}>全額</option>
                            <option value="split" ${defaultExtra === 'split' ? 'selected' : ''}>平分</option>
                            <option value="none" ${defaultExtra === 'none' ? 'selected' : ''}>不領取</option>
                        </select>
                    </td>
                    <td class="px-2 py-2 text-right font-bold text-indigo-600 total-cell"></td>
                `;
                tableBody.appendChild(row);
            }
            
            const baseSelect = row.querySelector('.base-mode-select');
            const extraSelect = row.querySelector('.extra-mode-select');

            baseSelect.options[0].text = `全額 (+$${maxCost})`;
            baseSelect.options[1].text = `平分 (+$${Math.round(maxCost/carpoolCount)})`;
            baseSelect.options[2].text = `不領取`;

            extraSelect.options[0].text = `全額 (+$${extraFeeTotal})`;
            extraSelect.options[1].text = `平分 (+$${Math.round(extraFeeTotal/carpoolCount)})`;
            extraSelect.options[2].text = `不領取`;
            
            if (!hasCrossCity) {
                if (extraSelect.value === 'split') extraSelect.value = 'full';
            }

            let myBase = 0;
            const baseMode = baseSelect.value;
            if (baseMode === 'full') myBase = maxCost;
            else if (baseMode === 'split') myBase = maxCost / carpoolCount;

            let myExtra = 0;
            const extraMode = extraSelect.value;
            if (extraMode === 'full') myExtra = extraFeeTotal;
            else if (extraMode === 'split') myExtra = extraFeeTotal / carpoolCount;
            
            const myTotal = myBase + myExtra;
            dayResult[app] = myTotal;

            row.querySelector('.total-cell').innerText = `$${Math.round(myTotal)}`;
        });

        return dayResult;
    }

    }

    function handleLogin() {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        
        if (user === 'admin' && pass === '28207426') {
            hideLogin();
            openAdmin();
        } else {
            document.getElementById('loginError').classList.remove('hidden');
        }
    }

    function openAdmin() {
        document.getElementById('adminPanel').classList.remove('hidden');
        renderAdminTable();
        renderAdminApplicants();
    }

    function closeAdmin() {
        document.getElementById('adminPanel').classList.add('hidden');
        // 關閉後台時，自動更新前台列表與重新計算
        onOfficeChange();
        recalculateAll();
    }

    function renderAdminTable() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';
        
        vendorsDB.forEach((v, idx) => {
            const tr = document.createElement('tr');
            tr.className = "border-b border-gray-100 hover:bg-gray-50 transition-colors";
            tr.innerHTML = `
                <td class="p-3 text-sm text-gray-800">${v.name}</td>
                <td class="p-3 text-sm text-gray-600">${v.city}</td>
                <td class="p-3"><span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-xs border border-blue-100">${v.office}</span></td>
                <td class="p-3 text-sm font-bold text-gray-700">$${v.cost}</td>
                <td class="p-3 text-center space-x-1">
                    <button onclick="editVendor(${idx})" class="btn btn-outline py-1 px-2 text-xs text-blue-500 hover:bg-blue-50 hover:text-blue-700 border-blue-200"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteVendor(${idx})" class="btn btn-outline py-1 px-2 text-xs text-red-500 hover:bg-red-50 hover:text-red-700 border-red-200"><i class="fas fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function saveVendor() {
        const name = document.getElementById('vName').value.trim();
        const city = document.getElementById('vCity').value.trim();
        const office = document.getElementById('vOffice').value;
        const cost = parseInt(document.getElementById('vCost').value);
        const editIdx = parseInt(document.getElementById('editIndex').value);

        if (!name || !city || isNaN(cost)) {
            alert("請填寫完整的名稱、縣市與費用！");
            return;
        }

        const newVendor = { name, city, office, cost };

        if (editIdx === -1) {
            // Add mode
            if (vendorsDB.some(v => v.name === name)) {
                if(!confirm("系統內已有同名廠商，確定要重複新增嗎？")) return;
            }
            // 新增放置於最上方以利查看
            vendorsDB.unshift(newVendor); 
        } else {
            // Edit mode
            vendorsDB[editIdx] = newVendor;
        }

        saveToLocal();
        resetAdminForm();
        renderAdminTable();
        // 提示儲存成功 (輕量化提示)
        const btn = event.currentTarget;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check mr-1"></i> 已儲存';
        btn.classList.add('bg-green-600');
        setTimeout(() => { btn.innerHTML = originalText; btn.classList.remove('bg-green-600'); }, 1500);
    }

    function editVendor(idx) {
        const v = vendorsDB[idx];
        document.getElementById('vName').value = v.name;
        document.getElementById('vCity').value = v.city;
        document.getElementById('vOffice').value = v.office;
        document.getElementById('vCost').value = v.cost;
        
        document.getElementById('editIndex').value = idx;
        document.getElementById('adminFormTitle').innerHTML = "<i class='fas fa-edit text-blue-500 mr-2'></i>編輯行程廠商";
        document.getElementById('cancelEditBtn').classList.remove('hidden');
        
        // 編輯時捲動回最上方填寫表單
        document.getElementById('adminPanel').scrollTo({ top: 0, behavior: 'smooth' });
        // 提示框動畫
        const formCard = document.getElementById('adminFormTitle').parentElement;
        formCard.classList.remove('border-green-500');
        formCard.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');
        setTimeout(() => formCard.classList.remove('ring-2', 'ring-blue-200'), 1000);
    }

    function deleteVendor(idx) {
        if (confirm(`確定要刪除「${vendorsDB[idx].name}」的資料嗎？`)) {
            vendorsDB.splice(idx, 1);
            saveToLocal();
            renderAdminTable();
        }
    }

    function resetAdminForm() {
        document.getElementById('vName').value = '';
        document.getElementById('vCity').value = '';
        document.getElementById('vOffice').value = '新北';
        document.getElementById('vCost').value = '';
        document.getElementById('editIndex').value = '-1';
        document.getElementById('adminFormTitle').innerHTML = "新增行程廠商";
        document.getElementById('cancelEditBtn').classList.add('hidden');
        
        const formCard = document.getElementById('adminFormTitle').parentElement;
        formCard.classList.add('border-green-500');
        formCard.classList.remove('border-blue-500');
    }

    function saveToLocal() {
        localStorage.setItem('vendorsDB', JSON.stringify(vendorsDB));
    }

    function resetToDefaultVendors() {
        if (confirm("注意：這將會清除您所有手動新增、編輯的廠商資料，並完全恢復為系統原始名單。\n\n確定要繼續嗎？")) {
            vendorsDB = JSON.parse(JSON.stringify(defaultVendorsDB));
            saveToLocal();
            renderAdminTable();
        }
    }

    function renderAdminApplicants() {
        const container = document.getElementById('adminApplicantList');
        container.innerHTML = '';
        applicantsDB.forEach((name, idx) => {
            const tag = document.createElement('div');
            tag.className = 'applicant-tag bg-white shadow-sm border border-gray-200';
            tag.innerHTML = `<span><i class="fas fa-user mr-1 text-blue-400"></i>${name}</span> <button onclick="adminDeleteApplicant(${idx})" class="ml-2 text-red-400 hover:text-red-600"><i class="fas fa-times"></i></button>`;
            container.appendChild(tag);
        });
        updateApplicantDatalist();
    }

    function adminAddApplicant() {
        const name = document.getElementById('adminNewApplicant').value.trim();
        if(name && !applicantsDB.includes(name)) {
            applicantsDB.push(name);
            saveApplicantsToLocal();
            renderAdminApplicants();
            document.getElementById('adminNewApplicant').value = '';
            
            // 加入按鈕回饋
            const btn = document.querySelector('button[onclick="adminAddApplicant()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check mr-1"></i> 已儲存';
            btn.classList.add('bg-green-600', 'border-green-600');
            setTimeout(() => { 
                btn.innerHTML = originalText; 
                btn.classList.remove('bg-green-600', 'border-green-600'); 
            }, 1500);

        } else if (applicantsDB.includes(name)) {
            alert("此人員已在名單中！");
        } else {
            alert("請輸入人員姓名！");
        }
    }

    function adminDeleteApplicant(idx) {
        if(confirm(`確定要將「${applicantsDB[idx]}」從預設名單中刪除嗎？`)) {
            applicantsDB.splice(idx, 1);
            saveApplicantsToLocal();
            renderAdminApplicants();
        }
    }

    function saveApplicantsToLocal() {
        localStorage.setItem('applicantsDB', JSON.stringify(applicantsDB));
    }
</script>

</body>
</html>
